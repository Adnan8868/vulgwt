<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Handouts | LGWT Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="https://img.icons8.com/fluency/48/graduation-cap.png" type="image/x-icon">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #2a5298 100%);
        }

        .subject-card {
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
    </style>
</head>

<body class="bg-slate-50">

    <header class="hero-gradient text-white py-12 px-4 shadow-2xl text-center">
        <h1 class="text-3xl md:text-5xl font-extrabold mb-4 uppercase tracking-widest">PSC <span
                class="text-yellow-400">Handouts</span> Hub</h1>
        <p class="text-blue-100 text-lg opacity-90">Political Science and International Relations material.</p>
        <div
            class="max-w-xl mx-auto mt-10 relative rounded-full overflow-hidden shadow-2xl bg-white text-left">
            <span class="absolute inset-y-0 left-5 flex items-center text-slate-400"><i
                    class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" id="searchInput" onkeyup="searchSubjects()"
                placeholder="Search (e.g. PSC201)..."
                class="w-full py-5 pl-14 pr-6 text-slate-900 font-bold outline-none border-none">
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-10">
            <a href="handouts.html"
                class="inline-flex items-center gap-2 bg-white px-6 py-3 rounded-2xl text-blue-800 font-bold shadow-sm hover:shadow-md transition border border-gray-100">
                <i class="fa-solid fa-arrow-left"></i> Back to Resource Hub
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="subjectContainer">
            <script>
                const pscData = [
                    {
                        id: "PSC201",
                        name: "International Relations",
                        handouts: "1Oq25bGbk14gvYABupLJhJlG6scArNhav",
                        highlighted: "not_found.html",
                        ppt: "not_found.html"
                    },
                    {
                        id: "PSC401",
                        name: "Public International Law",
                        handouts: "17Hg0fFhLx7XY39fFaIW5Uj9NN1tLWa5A",
                        highlighted: "not_found.html",
                        ppt: "not_found.html"
                    }
                ];

                const container = document.getElementById('subjectContainer');
                pscData.forEach(item => {
                    const hLink = item.handouts.startsWith('http') ? item.handouts : `https://drive.google.com/uc?export=download&id=${item.handouts}`;
                    
                    container.innerHTML += `
                        <div class="card subject-card bg-white p-8 rounded-[2.5rem] flex flex-col justify-between shadow-sm">
                            <div>
                                <span class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest italic">Political Science</span>
                                <h3 class="text-2xl font-black text-slate-800 mt-3">${item.id}</h3>
                                <p class="text-slate-500 text-sm font-medium mb-8 leading-tight">${item.name}</p>
                            </div>
                            <div class="space-y-3">
                                <a href="${hLink}" class="flex items-center justify-center gap-2 w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition" target="_blank"><i class="fa-solid fa-file-pdf"></i> Handouts</a>
                                
                                ${item.highlighted === "not_found.html" 
                                    ? `<button disabled class="flex items-center justify-center gap-2 w-full py-3 bg-slate-200 text-slate-400 rounded-xl font-bold cursor-not-allowed opacity-70"><i class="fa-solid fa-ban"></i> Highlights Not Available</button>`
                                    : `<a href="${item.highlighted}" class="flex items-center justify-center gap-2 w-full py-3 bg-gradient-to-r from-orange-500 to-yellow-400 text-blue-900 rounded-xl font-bold hover:bg-yellow-500 transition" target="_blank"><i class="fa-solid fa-highlighter"></i> Highlighted</a>`
                                }

                                ${item.ppt === "not_found.html" 
                                    ? `<button disabled class="flex items-center justify-center gap-2 w-full py-3 bg-slate-200 text-slate-400 rounded-xl font-bold cursor-not-allowed opacity-70"><i class="fa-solid fa-ban"></i> PPT Not Available</button>`
                                    : `<a href="${item.ppt}" class="flex items-center justify-center gap-2 w-full py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-900 transition" target="_blank"><i class="fa-solid fa-file-powerpoint"></i> PPT Slides</a>`
                                }
                            </div>
                        </div>`;
                });

                function searchSubjects() {
                    let input = document.getElementById('searchInput').value.toUpperCase();
                    let cards = document.getElementsByClassName('subject-card');
                    for (let i = 0; i < cards.length; i++) {
                        let text = cards[i].innerText.toUpperCase();
                        cards[i].style.display = text.includes(input) ? "" : "none";
                    }
                }
            </script>
        </div>
    </div>

    <!-- Footer space (LMS Handling section same as PAK page) -->
    <div id="footer-placeholder"></div>

    <script>
        // Aapka existing footer fetch logic
        fetch('handouts-footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>

</body>
</html>
