<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Subjects</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <link rel="icon" href="https://img.icons8.com/fluency/48/graduation-cap.png" type="image/x-icon">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f1f5f9;
            color: #1e3c72;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        .header p {
            margin-top: 5px;
            font-size: 18px;
            opacity: 0.85;
        }

        /* SEARCH BOX */
        .search-box {
            margin-top: 20px;
        }

        .search-box input {
            padding: 12px 15px;
            width: 280px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        /* CARD */
        .card {
            background: linear-gradient(135deg, #ffffff, #e0e7ff);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 22px;
            color: #1e3c72;
        }

        .book-name {
            font-size: 16px;
            margin-bottom: 20px;
            color: #334155;
        }

        /* BUTTONS */
        .card a {
            display: block;
            margin: 10px 0;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            transition: 0.3s;
        }

        .handouts {
            background: linear-gradient(135deg, #3b6cb7, #1e3c72);
        }

        .handouts:hover {
            background: linear-gradient(135deg, #1e3c72, #3b6cb7);
            transform: translateY(-3px) scale(1.05);
        }

        .highlighted {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #1e3c72;
        }

        .highlighted:hover {
            background: linear-gradient(135deg, #ff9900, #ffcc00);
            transform: translateY(-3px) scale(1.05);
        }

        .ppt {
            background: linear-gradient(135deg, #10b981, #047857);
        }

        .ppt:hover {
            background: linear-gradient(135deg, #047857, #10b981);
            transform: translateY(-3px) scale(1.05);
        }

        /* BACK BUTTON */
        .back-btn {
            display: inline-block;
            margin: 20px 0 20px 10px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #1e3c72;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-3px) scale(1.05);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-size: 14px;
            margin-top: 40px;
        }

        footer a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .search-box input {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>PSC Subject Handouts</h1>
        <p>Choose your subject and download study material</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by code or subject..." onkeyup="searchSubjects()">
        </div>
    </div>

    <div class="container" id="subjectContainer">
        <!-- PSC201 -->
        <div class="card">
            <h3>PSC201</h3>
            <p class="book-name">International Relations</p>
            <a href="https://drive.google.com/uc?export=download&id=1Oq25bGbk14gvYABupLJhJlG6scArNhav" class="handouts"
                target="_blank">Handouts</a>
            <a href="not_found.html" class="highlighted">Highlighted</a>
            <a href="not_found.html" class="ppt">PPT Slides</a>
        </div>
        <!-- PSC401 -->
        <div class="card">
            <h3>PSC401</h3>
            <p class="book-name">Public International Law</p>
            <a href="https://drive.google.com/uc?export=download&id=17Hg0fFhLx7XY39fFaIW5Uj9NN1tLWa5A" class="handouts"
                target="_blank">Handouts</a>
            <a href="not_found.html" class="highlighted">Highlighted</a>
            <a href="not_found.html" class="ppt">PPT Slides</a>
        </div>

    </div>

    <a href="handouts.html" class="back-btn">Back to Handouts</a>

    <div id="footer-placeholder"></div>

    <script>
        fetch('handouts-footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>

    <script src="search_script.js"></script>

</body>

</html>
